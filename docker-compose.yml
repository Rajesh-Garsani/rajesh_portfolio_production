services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      SQLITE_DB_PATH: /app/data/db.sqlite3
    volumes:
      - sqlite_data:/app/data
    ports:
      - "8000:8000"
  frontend:
    build: ./frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
volumes:
  sqlite_data:
